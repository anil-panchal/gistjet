# GitHub secret scanning configuration.
#
# The files below are intentional test fixtures for GistJet's own secret-scanner
# and log-redactor. They contain synthetic, non-functional tokens crafted to
# match real-world credential patterns so the detector's unit tests remain
# meaningful. Excluding them here suppresses GitHub secret-scanning *alerts*
# on those paths. Push protection is configured separately in repository
# settings and is bypassed per-finding via the web UI.

paths-ignore:
  - "tests/fixtures/scanner/**"
  - "tests/core/secret-scanner.spec.ts"
  - "tests/core/redactor.spec.ts"
  - "tests/core/redactor-invariants.spec.ts"
